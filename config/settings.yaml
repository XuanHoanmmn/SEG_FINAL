project:
  name: SEG_FINAL
  domain: vietnamese_recipes

crawler:
  user_agent: SEG_FINAL-AcademicSearchProject/1.0
  obey_robots_txt: true
  download_delay_seconds: 1.5
  concurrent_requests_per_domain: 2
  request_timeout_seconds: 20
  retry_times: 2

preprocessing:
  lowercase: true
  unicode_form: NFC
  create_accentless_form: true
  remove_stopwords_for_ranking: true

ranking:
  baseline: tfidf
  advanced: bm25f
  bm25f_k1: 1.2
  phrase_boost: 2.0
  proximity_boost: 1.0
  title_weight: 3.0
  ingredients_weight: 2.0
  category_weight: 1.5
  content_weight: 1.0
  query_expansion:
    enabled_for: bm25f
    expansion_weight: 0.35
    concepts:
      hai_san: [cá, tôm, mực, nghêu, ốc]

evaluation:
  top_k: 10
  query_count_target: 20
  pool_depth: 5
  latency_runs: 3
  graded_relevance: true
